name: Build and Release APK

on:
  push:
    tags:
      - 'v*'          # Runs when you push a tag like v1.0.0, v1.1.0, etc.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          VERSION="${{ github.ref_name }}"
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/CheesUs-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/CheesUs-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
